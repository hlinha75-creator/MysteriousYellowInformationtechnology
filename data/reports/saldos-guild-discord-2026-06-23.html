  <title>Saldos Guild + Discord</title>
  <style>
    :root { --bg:#f6f7f9; --panel:#fff; --text:#182230; --muted:#667085; --line:#d9dee7; --ok:#087443; --bad:#b42318; --warn:#b54708; --info:#175cd3; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
    main { width:min(1280px, calc(100% - 32px)); margin:24px auto 40px; }
    header { display:flex; justify-content:space-between; gap:16px; align-items:flex-end; margin-bottom:16px; }
    h1 { margin:0 0 6px; font-size:28px; }
    p { margin:0; color:var(--muted); }
    .filters,.metrics,.table-wrap { background:var(--panel); border:1px solid var(--line); border-radius:8px; }
    .filters { display:grid; grid-template-columns:minmax(220px,1.4fr) repeat(4,minmax(130px,1fr)); gap:12px; padding:14px; margin-bottom:14px; }
    label { display:grid; gap:6px; font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; }
    input,select { min-height:38px; border:1px solid var(--line); border-radius:6px; padding:8px 10px; font:inherit; background:#fff; color:var(--text); }
    .metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:1px; overflow:hidden; margin-bottom:14px; }
    .metric { padding:14px; background:#fff; }
    .metric span { display:block; color:var(--muted); font-size:12px; font-weight:800; text-transform:uppercase; }
    .metric strong { display:block; margin-top:5px; font-size:21px; }
    .table-wrap { overflow:auto; }
    table { width:100%; min-width:1080px; border-collapse:collapse; background:#fff; }
    th,td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    th { position:sticky; top:0; background:#f8fafc; color:var(--muted); font-size:12px; text-transform:uppercase; z-index:1; }
    .name { font-weight:800; }
    .sub { color:var(--muted); font-size:13px; margin-top:2px; }
    .amount, th.amount { text-align:right; font-weight:800; }
    .positive { color:var(--ok); } .negative { color:var(--bad); } .zero { color:var(--warn); }
    .pill { display:inline-block; border-radius:999px; padding:3px 8px; font-size:12px; font-weight:800; background:#eef2f6; color:#344054; }
    .pill.yes { background:#dcfae6; color:#067647; } .pill.no { background:#fee4e2; color:#b42318; }
    .empty { padding:28px; text-align:center; color:var(--muted); }
    @media (max-width:900px) { main{width:min(100% - 20px,1280px);margin-top:14px;} header{display:block;} .filters{grid-template-columns:1fr;} .metrics{grid-template-columns:1fr 1fr;} }
  </style>
</head>

const search = document.querySelector('#search');
const guild = document.querySelector('#guild');
const status = document.querySelector('#status');
const minBalance = document.querySelector('#minBalance');
const sort = document.querySelector('#sort');
const rowsEl = document.querySelector('#rows');
const metricsEl = document.querySelector('#metrics');
const visibleCount = document.querySelector('#visibleCount');
for (const input of [search,guild,status,minBalance,sort]) { input.addEventListener('input', render); input.addEventListener('change', render); }
function normalize(value){return String(value||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();}
function nameOf(row){return row.albion_name || row.discord_name || row.discord_id || '';}
function filteredRows(){const q=normalize(search.value); const min=minBalance.value===''?null:Number(minBalance.value); return allRows.filter(row=>!q||normalize(row.albion_name+' '+row.discord_name+' '+row.discord_id+' '+row.guild_roles).includes(q)).filter(row=>guild.value!=='yes'||row.in_albion_guild).filter(row=>guild.value!=='no'||!row.in_albion_guild).filter(row=>status.value!=='positive'||row.balance>0).filter(row=>status.value!=='zero'||row.balance===0).filter(row=>status.value!=='negative'||row.balance<0).filter(row=>min==null||row.balance>=min).sort(sorter(sort.value));}
function sorter(mode){if(mode==='balance_desc')return(a,b)=>b.balance-a.balance||nameOf(a).localeCompare(nameOf(b)); if(mode==='balance_asc')return(a,b)=>a.balance-b.balance||nameOf(a).localeCompare(nameOf(b)); if(mode==='guild_first')return(a,b)=>Number(b.in_albion_guild)-Number(a.in_albion_guild)||nameOf(a).localeCompare(nameOf(b)); return(a,b)=>nameOf(a).localeCompare(nameOf(b));}
function render(){const rows=filteredRows(); visibleCount.textContent=rows.length+' linhas'; const total=rows.reduce((s,r)=>s+r.balance,0); metricsEl.innerHTML=[metric('Linhas',rows.length),metric('Na guild',rows.filter(r=>r.in_albion_guild).length),metric('Com Discord',rows.filter(r=>r.discord_id).length),metric('Saldo total',silver(total)),metric('Negativos',rows.filter(r=>r.balance<0).length)].join(''); rowsEl.innerHTML=rows.length?rows.map(rowHtml).join(''):'<tr><td colspan="7" class="empty">Nenhum registro encontrado.</td></tr>';}
function rowHtml(row){const klass=row.balance>0?'positive':row.balance<0?'negative':'zero'; return '<tr><td><div class="name">'+escapeHtml(row.albion_name||'-')+'</div><div class="sub">'+escapeHtml(row.discord_name||'-')+'</div></td><td>'+(row.in_albion_guild?'<span class="pill yes">sim</span>':'<span class="pill no">nao</span>')+'</td><td>'+escapeHtml(row.last_seen||'-')+'</td><td>'+escapeHtml(row.guild_roles||'-')+'</td><td>'+escapeHtml(row.discord_id||'-')+'</td><td class="amount '+klass+'">'+silver(row.balance)+'</td><td>'+escapeHtml(row.last_updated||'-')+'</td></tr>';}
function metric(label,value){return '<div class="metric"><span>'+escapeHtml(label)+'</span><strong>'+escapeHtml(value)+'</strong></div>';}
function silver(value){return new Intl.NumberFormat('pt-BR').format(Number(value||0));}
function escapeHtml(value){return String(value==null?'':value).replace(/[&<>"']/g, char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));}
