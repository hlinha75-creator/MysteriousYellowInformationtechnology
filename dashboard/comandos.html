<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comandos do NOTAG Bot</title>
  <link rel="stylesheet" href="comandos.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">NOTAG Bot</p>
        <h1>Comandos</h1>
      </div>
      <span id="countBadge" class="count-badge">0 comandos</span>
    </header>

    <section class="toolbar" aria-label="Filtros">
      <label class="search">
        <span>Buscar</span>
        <input id="searchInput" type="search" placeholder="Ex: saldo, evento, CSV">
      </label>
      <label class="filter">
        <span>Categoria</span>
        <select id="categoryFilter">
          <option value="all">Todas</option>
        </select>
      </label>
    </section>

    <section id="commandList" class="command-list" aria-live="polite"></section>
  </main>

  <script src="comandos.js"></script>
</body>
</html>
